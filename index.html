<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #222; touch-action: none; /* Mobilde kaydırmayı engeller */ }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Ekran boyutunu tam kapla
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Top ayarları
    let x = canvas.width / 2;
    let y = canvas.height - 100;
    let dx = 4;
    let dy = -4;
    let ballRadius = 10;

    // Kontrol Çubuğu (Raket)
    let paddleHeight = 15;
    let paddleWidth = 100;
    let paddleX = (canvas.width - paddleWidth) / 2;

    // Mavi Duvarlar (Tuğlalar)
    let brickRowCount = 5; // 5 satır tuğla
    let brickColumnCount = Math.floor(canvas.width / 75); // Ekrana sığacak kadar sütun
    let brickWidth = 65;
    let brickHeight = 20;
    let brickPadding = 10;
    let brickOffsetTop = 50;
    let brickOffsetLeft = (canvas.width - (brickColumnCount * (brickWidth + brickPadding))) / 2;

    let bricks = [];
    for(let c = 0; c < brickColumnCount; c++) {
        bricks[c] = [];
        for(let r = 0; r < brickRowCount; r++) {
            bricks[c][r] = { x: 0, y: 0, status: 1 }; // status 1: kırılmamış
        }
    }

    // Parmağınla çubuğu hareket ettirme
    canvas.addEventListener("touchmove", (e) => {
        let relativeX = e.touches[0].clientX;
        if(relativeX > 0 && relativeX < canvas.width) {
            paddleX = relativeX - paddleWidth / 2;
        }
    });

    // Bilgisayardan fare ile oynarsan diye
    canvas.addEventListener("mousemove", (e) => {
        let relativeX = e.clientX;
        if(relativeX > 0 && relativeX < canvas.width) {
            paddleX = relativeX - paddleWidth / 2;
        }
    });

    function drawBricks() {
        for(let c = 0; c < brickColumnCount; c++) {
            for(let r = 0; r < brickRowCount; r++) {
                if(bricks[c][r].status === 1) { // Eğer tuğla duruyorsa çiz
                    let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                    let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                    bricks[c][r].x = brickX;
                    bricks[c][r].y = brickY;
                    ctx.beginPath();
                    ctx.rect(brickX, brickY, brickWidth, brickHeight);
                    ctx.fillStyle = "#0095DD"; // Mavi renk
                    ctx.fill();
                    ctx.closePath();
                }
            }
        }
    }

    function collisionDetection() {
        for(let c = 0; c < brickColumnCount; c++) {
            for(let r = 0; r < brickRowCount; r++) {
                let b = bricks[c][r];
                if(b.status === 1) { // Top tuğlaya çarptı mı?
                    if(x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                        dy = -dy; // Topu sektir
                        b.status = 0; // Tuğlayı yok et
                    }
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawBricks();

        // Topu çiz (Kırmızı)
        ctx.beginPath();
        ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
        ctx.fillStyle = "#FF0000";
        ctx.fill();
        ctx.closePath();

        // Çubuğu çiz (Beyaz)
        ctx.beginPath();
        ctx.rect(paddleX, canvas.height - 40, paddleWidth, paddleHeight);
        ctx.fillStyle = "#FFFFFF";
        ctx.fill();
        ctx.closePath();

        collisionDetection();

        // Sağ-Sol Duvara çarpma
        if(x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
            dx = -dx;
        }
        
        // Üst duvara çarpma
        if(y + dy < ballRadius) {
            dy = -dy;
        } 
        // Çubuğa (Rakete) çarpma
        else if(y + dy > canvas.height - ballRadius - 40) {
            if(x > paddleX && x < paddleX + paddleWidth) {
                dy = -dy; // Kurtardın, sekti!
            } else if (y + dy > canvas.height - ballRadius) {
                // Topu yere düşürdün (Oyun şimdilik bitmesin diye yerden de sekiyor)
                dy = -dy; 
            }
        }

        x += dx;
        y += dy;
        
        requestAnimationFrame(draw);
    }
    
    draw();
</script>
</body>
</html>
