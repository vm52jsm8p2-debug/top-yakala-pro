<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#222; touch-action:none;">
<canvas id="c"></canvas>
<script>
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");
    c.width = window.innerWidth;
    c.height = window.innerHeight;

    let p = {x:100, y:300, a:0}, a = {x:150, y:350}, en = [{x:500, y:300, l:Date.now()}];
    let bullets = [];

    // Hareket ve Ateş (Tüm ekran)
    c.ontouchmove = (e) => {
        let t = e.touches[0];
        if(t.clientX < window.innerWidth/2) {
            p.x += (t.clientX - (p.x+10))/10; p.y += (t.clientY - (p.y+10))/10;
        } else {
            p.a = Math.atan2(t.clientY - p.y, t.clientX - p.x);
            if(Date.now() % 100 < 20) bullets.push({x:p.x, y:p.y, vx:Math.cos(p.a)*10, vy:Math.sin(p.a)*10, color:'yellow'});
        }
    };

    function loop() {
        ctx.fillStyle = "rgba(34, 34, 34, 0.3)";
        ctx.fillRect(0,0,c.width,c.height);

        // Oyuncu ve Arkadaş
        ctx.fillStyle="blue"; ctx.fillRect(p.x, p.y, 30, 30);
        ctx.fillStyle="green"; ctx.fillRect(a.x, a.y, 30, 30);
        
        // Arkadaş Yapay Zekası
        a.x += (p.x - a.x)/100; a.y += (p.y - a.y)/100;
        if(Date.now() % 500 < 50) bullets.push({x:a.x, y:a.y, vx:5, vy:0, color:'lime'});

        // Düşman
        en.forEach(e => {
            ctx.fillStyle="red"; ctx.fillRect(e.x, e.y, 30, 30);
            if(Date.now() - e.l > 1500) {
                bullets.push({x:e.x, y:e.y, vx:-5, vy:0, color:'white'});
                e.l = Date.now();
            }
        });

        // Mermiler
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, 10, 10);
            if(b.x < 0 || b.x > c.width) bullets.splice(i, 1);
        });

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
