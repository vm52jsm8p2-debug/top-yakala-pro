<!DOCTYPE html>
<html>
<body>
<canvas id="c"></canvas>
<script>
    const c = document.getElementById("c");
    const x = c.getContext("2d");
    c.width = window.innerWidth;
    c.height = window.innerHeight;

    let b = {x: 100, y: 100, active: false};

    function loop() {
        x.clearRect(0, 0, c.width, c.height);
        
        // Buraya bakın ve Ok
        if (!b.active) {
            x.fillStyle = "yellow";
            x.font = "50px Arial";
            x.textAlign = "center";
            x.fillText("BURAYA BAKIN", c.width / 2, c.height / 2);
            x.fillText("⬇", c.width / 2, c.height / 2 + 60);
        }

        // Dokununca oyunu başlat
        window.onclick = () => { b.active = true; };
        
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
