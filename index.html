<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Top Yakala Pro</title>
<style>
  body {
    margin: 0;
    background: #111;
    overflow: hidden;
    font-family: sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  canvas {
    display: block;
    background: #222;
  }
  #score {
    position: absolute;
    top: 50px;
    left: 20px;
    color: #fff;
    font-size: 32px;
    font-weight: bold;
    z-index: 10;
  }
  .btn {
    position: absolute;
    bottom: 40px;
    width: 42%;
    height: 85px;
    border: none;
    border-radius: 20px;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #left { left: 5%; }
  #right { right: 5%; }
  svg { pointer-events: none; }
</style>
</head>
<body>

<div id="score">Puan: 0</div>
<canvas id="game"></canvas>

<button id="left" class="btn">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
    <path d="M15.5 19l-7-7 7-7v14z"/>
  </svg>
</button>

<button id="right" class="btn">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
    <path d="M8.5 5l7 7-7 7V5z"/>
  </svg>
</button>
