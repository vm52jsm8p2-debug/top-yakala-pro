<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Emir - Brawl Stars Tarzı</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #ffcc00;
            background-color: #2c3e50; /* Çöl/Savaş alanı rengi */
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        #ui {
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">Skor: <span id="scoreVal">0</span> | Can: <span id="healthVal">100</span></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <p>Hareket: <b>WASD</b> | Ateş Etmek: <b>Mouse Sol Tık</b></p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Oyun Durumu
        let score = 0;
        let health = 100;
        let gameOver = false;

        // Oyuncu (Brawler) Özellikleri
        let player = {
            x: 300,
            y: 300,
            radius: 20,
            speed: 4,
            color: '#3498db' // Mavi takım
        };

        // Kontroller
        let keys = {};
        let mouse = { x: 0, y: 0 };

        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);
        
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        // Ateş Etme Mekaniği
        let bullets = [];
        canvas.addEventListener("mousedown", (e) => {
            if (gameOver) return;
            
            // Oyuncudan mouse imlecine doğru olan açıyı hesapla
            let dx = mouse.x - player.x;
            let dy = mouse.y - player.y;
            let angle = Math.atan2(dy, dx);

            // Yeni mermi ekle
            bullets.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 8, // Mermi hızı
                vy: Math.sin(angle) * 8,
                radius: 6,
                color: '#f1c40f' // Sarı mermi
            });
        });

        // Düşmanlar (Robotlar)
        let enemies = [];
        function spawnEnemy() {
            if (gameOver) return;
            
            // Ekranın dışından rastgele bir yerden gelsinler
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -20 : canvas.width + 20;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? -20 : canvas.height + 20;
            }

            enemies.push({
                x: x,
                y: y,
                radius: 15,
                speed: 1.5 + Math.random() * 1.5, // Farklı hızlarda robotlar
                color: '#e74c3c' // Kırmızı düşman
            });

            // Zamanla daha hızlı düşman doğsun (Zorluk seviyesi)
            setTimeout(spawnEnemy, Math.max(500, 2000 - score * 50));
        }

        // İlk düşmanı doğur
        spawnEnemy();

        // Oyun Döngüsü
        function gameLoop() {
            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("OYUN BİTTİ", canvas.width/2 - 110, canvas.height/2);
                ctx.font = "20px Arial";
                ctx.fillText("Yeniden başlamak için sayfayı yenile!", canvas.width/2 - 160, canvas.height/2 + 40);
                return;
            }

            // 1. Ekranı Temizle
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. Oyuncu Hareketi (WASD)
            if (keys['w'] && player.y > player.radius) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height - player.radius) player.y += player.speed;
            if (keys['a'] && player.x > player.radius) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width - player.radius) player.x += player.speed;

            // Oyuncuyu Çiz
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();

            // Oyuncunun yönünü (silahını) çiz
            let angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + Math.cos(angle) * 30, player.y + Math.sin(angle) * 30);
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.closePath();

            // 3. Mermileri Güncelle ve Çiz
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                // Ekrandan çıkan mermileri sil
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                    continue;
                }

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
                ctx.closePath();
            }

            // 4. Düşmanları Güncelle, Çiz ve Çarpışmaları Kontrol Et
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];

                // Düşman oyuncuya doğru ilerlesin
                let edx = player.x - e.x;
                let edy = player.y - e.y;
                let eAngle = Math.atan2(edy, edx);
                e.x += Math.cos(eAngle) * e.speed;
                e.y += Math.sin(eAngle) * e.speed;

                // Düşmanı Çiz
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();
                ctx.closePath();

                // Oyuncu ile Düşman Çarpıştı mı? (Can Azalması)
                let distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                if (distToPlayer < player.radius + e.radius) {
                    enemies.splice(i, 1);
                    health -= 10;
                    document.getElementById("healthVal").innerText = health;
                    if (health <= 0) gameOver = true;
                    continue;
                }

                // Mermiler Düşmana Çarptı mı?
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let distToBullet = Math.hypot(b.x - e.x, b.y - e.y);
                    
                    if (distToBullet < b.radius + e.radius) {
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        document.getElementById("scoreVal").innerText = score;
                        break;
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // Oyunu Başlat
        gameLoop();
    </script>
</body>
</html>
