<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Yakala Pro</title>

<style>
  body {
    margin: 0;
    background: #111;
    overflow: hidden;
    font-family: Arial;
  }

  canvas {
    display: block;
    background: #222;
  }

  /* 🔥 BÜYÜK SKOR */
  #score {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 32px;
    font-weight: bold;
    z-index: 10;
  }

  /* 🔥 BUTONLAR */
  .btn {
    position: absolute;
    bottom: 20px;
    width: 45%;
    height: 70px;
    border: none;
    border-radius: 12px;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  #left { left: 5%; }
  #right { right: 5%; }

  svg {
    pointer-events: none;
  }
</style>
</head>

<body>

<div id="score">Puan: 0</div>
<canvas id="game"></canvas>

<!-- 🔥 GERÇEK OK İKONLARI -->
<button id="left" class="btn">
<svg width="35" height="35" viewBox="0 0 24 24" fill="white">
<path d="M15.5 19l-7-7 7-7v14z"/>
</svg>
</button>

<button id="right" class="btn">
<svg width="35" height="35" viewBox="0 0 24 24" fill="white">
<path d="M8.5 5l7 7-7 7V5z"/>
</svg>
</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;

// oyuncu (y değeri butonların hemen üstünde duracak şekilde ayarlandı)
let player = {
  x: canvas.width / 2 - 50,
  y: canvas.height - 110, // 👈 Burası değiştirildi (80 yerine 110 yapıldı)
  w: 100,
  h: 12,
  speed: 7
};

// top
let ball = {
  x: canvas.width / 2,
  y: 100,
  r: 15,
  speedX: 5,
  speedY: 6
};

let left = false;
let right = false;

// kontrol
function hold(btn, dir) {
  btn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (dir === "left") left = true;
    if (dir === "right") right = true;
  });

  btn.addEventListener("touchend", (e) => {
    e.preventDefault();
    if (dir === "left") left = false;
    if (dir === "right") right = false;
  });

  btn.addEventListener("mousedown", () => {
    if (dir === "left") left = true;
    if (dir === "right") right = true;
  });

  btn.addEventListener("mouseup", () => {
    if (dir === "left") left = false;
    if (dir === "right") right = false;
  });
}

hold(document.getElementById("left"), "left");
hold(document.getElementById("right"), "right");

// reset
function resetGame() {
  score = 0;
  document.getElementById("score").innerText = "Puan: " + score;

  ball.x = canvas.width / 2;
  ball.y = 100;
  ball.speedX = 5;
  ball.speedY = 6;
}

function update() {

  // oyuncu
  if (left) player.x -= player.speed;
  if (right) player.x += player.speed;

  if (player.x < 0) player.x = 0;
  if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

  // top
  ball.x += ball.speedX;
  ball.y += ball.speedY;

  // duvar
  if (ball.x <= ball.r || ball.x >= canvas.width - ball.r) {
    ball.speedX *= -1;
  }

  if (ball.y <= ball.r) {
    ball.speedY *= -1;
  }

  // kaçırma = reset
  if (ball.y >= canvas.height - ball.r) {
    resetGame();
  }

  // yakalama
  if (
    ball.y + ball.r >= player.y &&
    ball.x >= player.x &&
    ball.x <= player.x + player.w &&
    ball.speedY > 0
  ) {
    score++;
    document.getElementById("score").innerText = "Puan: " + score;

    ball.speedY *= -1;

    // hızlanma
    ball.speedX *= 1.05;
    ball.speedY *= 1.05;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // oyuncu
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // top
  ctx.beginPath();
  ctx.fillStyle = "red";
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
