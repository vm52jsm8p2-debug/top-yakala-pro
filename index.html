<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body { margin:0; background:#000; overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none; }
canvas { display:block; width:100vw; height:100vh; }
.btn { position:absolute; bottom:0; width:50%; height:200px; }
#l { left:0; } #r { right:0; }
#ui { position:absolute; top:10px; left:10px; color:white; font-family:sans-serif; font-size:20px; pointer-events:none; }
</style>
</head>
<body>
<div id="ui">Seviye: 1</div>
<canvas id="c"></canvas>
<div id="l" class="btn"></div>
<div id="r" class="btn"></div>
<script>
const c = document.getElementById("c"), x = c.getContext("2d");
c.width = window.innerWidth; c.height = window.innerHeight;
let p = {x:c.width/2-50, y:c.height-150, w:100, h:20};
let b = {x:c.width/2, y:200, dx:5, dy:5, r:15};
let w = [], particles = [], lvl = 1;

function initWalls() {
    w = []; particles = [];
    let speedBonus = (lvl - 1) * 0.8;
    b.dx = (b.dx > 0 ? 5 + speedBonus : -(5 + speedBonus));
    b.dy = -(5 + speedBonus);
    let rows = 3, cols = 5, gap = 15;
    let cellW = (c.width - 40) / cols;
    let cellH = 30;
    for(let i=0; i<rows; i++) {
        for(let j=0; j<cols; j++) {
            if(Math.random() > 0.3) w.push({ x: 20 + j*cellW + gap/2, y: 50 + i*(cellH+gap), w:cellW-gap, h:cellH });
        }
    }
    document.getElementById("ui").innerText = "Seviye: " + lvl;
}
initWalls();

let l=false, r=false;
document.getElementById("l").addEventListener("touchstart", (e) => { e.preventDefault(); l=true; });
document.getElementById("l").addEventListener("touchend", () => l=false);
document.getElementById("r").addEventListener("touchstart", (e) => { e.preventDefault(); r=true; });
document.getElementById("r").addEventListener("touchend", () => r=false);

function update(){
    if(l && p.x>0) p.x-=10;
    if(r && p.x<c.width-p.w) p.x+=10;
    b.x+=b.dx; b.y+=b.dy;
    
    if(b.x < b.r || b.x > c.width-b.r) b.dx *= -1;
    if(b.y < b.r) b.dy *= -1;
    
    if(b.y + b.r > p.y && b.y < p.y + p.h && b.x > p.x && b.x < p.x + p.w) b.dy = -Math.abs(b.dy);
    
    w.forEach((v,i)=>{
        if(b.x + b.r > v.x && b.x - b.r < v.x + v.w && b.y + b.r > v.y && b.y - b.r < v.y + v.h){ 
            // Patlama efekti: bloğun olduğu yere küçük parçacıklar ekle
            for(let k=0; k<5; k++) particles.push({x:v.x+v.w/2, y:v.y+v.h/2, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:20});
            w.splice(i,1); 
            b.dy *= -1; 
        }
    });
    
    x.clearRect(0,0,c.width,c.height);
    x.fillStyle="white"; x.fillRect(p.x,p.y,p.w,p.h);
    x.fillStyle="red"; x.beginPath(); x.arc(b.x,b.y,b.r,0,Math.PI*2); x.fill();
    x.fillStyle="cyan"; w.forEach(v=>x.fillRect(v.x,v.y,v.w,v.h));
    
    // Parçacıkları güncelle ve çiz
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        x.fillStyle = "yellow"; x.fillRect(p.x, p.y, 4, 4);
        if(p.life <= 0) particles.splice(i, 1);
    });
    
    if(w.length === 0) { lvl++; if(lvl>20) { alert("Şampiyon!"); lvl=1; } initWalls(); b.x=c.width/2; b.y=200; }
    if(b.y > c.height) { lvl=1; initWalls(); b.x=c.width/2; b.y=200; }
    requestAnimationFrame(update);
}
update();
</script>
</body>
</html>
