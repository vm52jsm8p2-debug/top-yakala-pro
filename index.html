<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Duvar Kirma Pro</title>
<style>
body { margin: 0; background: #111; overflow: hidden; touch-action: none; font-family: sans-serif; }
canvas { display: block; background: #222; width: 100vw; height: 100vh; }
#score { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 24px; pointer-events: none; }
.btn { position: absolute; bottom: 30px; width: 40%; height: 80px; background: #444; border-radius: 20px; border: none; }
#left { left: 5%; }
#right { right: 5%; }
</style>
</head>
<body>
<div id="score">Puan: 0</div>
<canvas id="game"></canvas>
<button id="left" class="btn"></button>
<button id="right" class="btn"></button>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

let score = 0;
let player = { x: canvas.width/2 - 50, y: canvas.height - 150, w: 100, h: 20, speed: 8 };
let ball = { x: canvas.width/2, y: 300, r: 10, sx: 4, sy: 4 };
let walls = [];
function initWalls() {
    walls = [];
    let w = (canvas.width - 40) / 10;
    for(let i=0; i<10; i++) walls.push({ x: 20 + i*w, y: 60, w: w-4, h: 20 });
}
initWalls();

let left = false, right = false;
document.getElementById("left").addEventListener("touchstart",()=>left=true);
document.getElementById("left").addEventListener("touchend",()=>left=false);
document.getElementById("right").addEventListener("touchstart",()=>right=true);
document.getElementById("right").addEventListener("touchend",()=>right=false);

function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(left) player.x -= player.speed;
    if(right) player.x += player.speed;
    
    ball.x += ball.sx; ball.y += ball.sy;
    if(ball.x < 0 || ball.x > canvas.width) ball.sx *= -1;
    if(ball.y < 0) ball.sy *= -1;
    if(ball.y > canvas.height) { score=0; ball.x=canvas.width/2; ball.y=300; initWalls(); }
    
    if(ball.y > player.y && ball.x > player.x && ball.x < player.x + player.w) ball.sy *= -1;
    
    walls.forEach((w,i) => {
        if(ball.x > w.x && ball.x < w.x + w.w && ball.y < w.y + w.h) {
            walls.splice(i,1); ball.sy *= -1; score+=10;
            document.getElementById("score").innerText = "Puan: " + score;
        }
        ctx.fillStyle = "cyan"; ctx.fillRect(w.x, w.y, w.w, w.h);
    });
    
    ctx.fillStyle = "lime"; ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
