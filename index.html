<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
    body { margin:0; background:#000; overflow:hidden; touch-action:none; }
    canvas { display:block; }
    .control { 
        position:absolute; bottom:0; width:50%; height:200px; 
        user-select: none; -webkit-user-select: none; 
        touch-action: none;
    }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="l" class="control" style="left:0"></div>
<div id="r" class="control" style="right:0"></div>
<script>
const c = document.getElementById("c");
const x = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;

let p = {x:c.width/2-50, y:c.height-150, w:100, h:20};
let b = {x:c.width/2, y:c.height-170, dx:5, dy:-5, r:15, active:false};
let w = [], gameOver = false;

function init() {
    w = []; 
    gameOver = false;
    b.active = false;
    // Raketi ortaya al
    p.x = c.width/2 - 50;
    // Topu raketin tam üzerine sabitle
    b.x = p.x + p.w/2;
    b.y = p.y - b.r;
    
    let cols = 5;
    let gap = 10;
    let wW = (c.width - (cols + 1) * gap) / cols;
    for(let i=0; i<cols; i++) {
        for(let j=0; j<3; j++) {
            w.push({x:gap + i*(wW+gap), y:50+j*40, w:wW, h:20});
        }
    }
}
init();

let l=false, r=false;
document.getElementById("l").addEventListener("touchstart",(e)=>{e.preventDefault(); l=true;});
document.getElementById("l").addEventListener("touchend",(e)=>{e.preventDefault(); l=false;});
document.getElementById("r").addEventListener("touchstart",(e)=>{e.preventDefault(); r=true;});
document.getElementById("r").addEventListener("touchend",(e)=>{e.preventDefault(); r=false;});

window.addEventListener("touchstart",(e)=>{
    if(gameOver) { 
        init(); // Yazı gider, oyun sıfırlanır, raket ve top ortaya ışınlanır
    } else if(!b.active) { 
        b.active=true; 
    }
});

function loop() {
    if(!gameOver) {
        if(l && p.x>0) p.x-=10;
        if(r && p.x<c.width-p.w) p.x+=10;
        
        if(b.active) {
            b.x+=b.dx; b.y+=b.dy;
            if(b.x<b.r || b.x>c.width-b.r) b.dx*=-1;
            if(b.y<b.r) b.dy*=-1;
            if(b.y>p.y-b.r && b.x>p.x && b.x<p.x+p.w) b.dy=-Math.abs(b.dy);
            
            w.forEach((v,i)=>{
                if(b.x>v.x && b.x<v.x+v.w && b.y>v.y && b.y<v.y+v.h) { w.splice(i,1); b.dy*=-1; }
            });
            if(b.y>c.height) gameOver = true;
        } else {
            // Oyun başlamadan önce top raketi takip eder
            b.x=p.x+p.w/2; b.y=p.y-b.r;
        }
    }
    
    x.clearRect(0,0,c.width,c.height);
    x.fillStyle="white"; x.fillRect(p.x,p.y,p.w,p.h);
    x.fillStyle="red"; x.beginPath(); x.arc(b.x,b.y,b.r,0,Math.PI*2); x.fill();
    x.fillStyle="cyan"; w.forEach(v=>x.fillRect(v.x,v.y,v.w,v.h));
    
    if(gameOver) {
        x.fillStyle="blue"; x.fillRect(c.width/2-100, c.height/2-40, 200, 80);
        x.fillStyle="white"; x.font="25px Arial"; x.textAlign="center";
        x.fillText("TRY AGAIN", c.width/2, c.height/2+10);
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
