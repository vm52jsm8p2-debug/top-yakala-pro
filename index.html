<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#556b2f; touch-action:none;">
<canvas id="c"></canvas>
<script>
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");
    c.width = window.innerWidth; c.height = window.innerHeight;

    // Araba objesi
    let car = { x: 200, y: 300, angle: 0, speed: 0 };

    // Dokunmatik kontrol
    c.ontouchmove = (e) => {
        let t = e.touches[0];
        // Sol taraf: Yön (Açı)
        if (t.clientX < window.innerWidth / 2) {
            car.angle = Math.atan2(t.clientY - car.y, t.clientX - car.x);
        } 
        // Sağ taraf: Gaz
        else {
            car.speed = 5;
        }
    };
    c.ontouchend = () => { car.speed = 0; };

    function loop() {
        // Arabayı hareket ettir
        car.x += Math.cos(car.angle) * car.speed;
        car.y += Math.sin(car.angle) * car.speed;

        ctx.clearRect(0, 0, c.width, c.height);
        
        // Araba Çizimi (Dikdörtgen araba)
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        ctx.fillStyle = "red";
        ctx.fillRect(-20, -10, 40, 20); // Araba gövdesi
        ctx.fillStyle = "black";
        ctx.fillRect(15, -12, 5, 5); // Tekerlek ön sağ
        ctx.fillRect(15, 7, 5, 5);   // Tekerlek arka sağ
        ctx.restore();

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
