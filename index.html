<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body { margin:0; background:#000; overflow:hidden; touch-action:none; }
canvas { display:block; }
.btn-container { position:absolute; bottom:0; width:100%; height:250px; display:flex; }
.btn { flex:1; touch-action:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="btn-container">
    <div id="left" class="btn"></div>
    <div id="right" class="btn"></div>
</div>
<script>
const c = document.getElementById("c");
const x = c.getContext("2d");
c.width = window.innerWidth; c.height = window.innerHeight;

let p = {x:c.width/2-100, y:c.height-300, w:200, h:30};
let b = {x:c.width/2, y:c.height-350, dx:8, dy:-8, r:15, active:false};
let w = [], level = 1, maxLevel = 1, gameOver = false, levelUp = false, showMenu = false;

function init() {
    w = []; gameOver = false; levelUp = false; showMenu = false; b.active = false;
    p.x = c.width/2-100; b.x = p.x+100; b.y = p.y-20;
    for(let i=0; i<15; i++) {
        if ((i + level * 2) % (Math.max(2, 5 - Math.floor(level/5))) === 0) {
            w.push({x: 50+(i%3)*150, y: 150+Math.floor(i/3)*80, w: 100, h:40});
        }
    }
}
init();

// Hareket kontrolü
document.getElementById("left").addEventListener("touchstart", () => { if(p.x > 0) p.x -= 40; });
document.getElementById("right").addEventListener("touchstart", () => { if(p.x < c.width-p.w) p.x += 40; });

window.addEventListener("touchstart", (e) => {
    let t = e.touches[0];
    if(showMenu) {
        let col = Math.floor(t.clientX / (c.width/2));
        let row = Math.floor((t.clientY - 200) / 150);
        let selected = row * 2 + col + 1;
        if(selected <= maxLevel) { level = selected; init(); }
        else showMenu = false;
    } else if(t.clientY < 100 && t.clientX < 200) { showMenu = true; }
    else if(gameOver) { init(); }
    else if(levelUp) { level++; if(level > maxLevel) maxLevel = level; init(); }
    else { b.active = true; }
});

function loop() {
    if(!gameOver && !levelUp && !showMenu) {
        if(b.active) {
            b.x += b.dx; b.y += b.dy;
            if(b.x<0 || b.x>c.width) b.dx *= -1;
            if(b.y<0) b.dy *= -1;
            if(b.y > p.y && b.x > p.x && b.x < p.x+p.w) b.dy = -Math.abs(b.dy);
            w.forEach((v,i) => {
                if(b.x > v.x && b.x < v.x+v.w && b.y > v.y && b.y < v.y+v.h) { w.splice(i,1); b.dy *= -1; }
            });
            if(w.length === 0) levelUp = true;
            if(b.y > c.height) gameOver = true;
        } else { b.x = p.x+100; }
    }
    
    x.clearRect(0,0,c.width,c.height);
    x.fillStyle="white"; x.fillRect(p.x,p.y,p.w,p.h);
    x.fillStyle="red"; x.beginPath(); x.arc(b.x,b.y,b.r,0,Math.PI*2); x.fill();
    x.fillStyle="cyan"; w.forEach(v => x.fillRect(v.x,v.y,v.w,v.h));
    
    x.fillStyle="white"; x.font="60px Arial";
    if(showMenu) {
        x.fillStyle="black"; x.fillRect(0,0,c.width,c.height);
        x.fillStyle="white"; x.fillText("SEVIYELER (Maks: "+maxLevel+")", 50, 100);
        for(let i=0; i<maxLevel; i++) {
            x.fillStyle = "green";
            x.fillRect((i%2)*300+50, 200+Math.floor(i/2)*150, 250, 120);
            x.fillStyle = "white"; x.fillText(i+1, (i%2)*300+150, 280+Math.floor(i/2)*150);
        }
    } else {
        x.fillText("Lvl: "+level, 40, 70);
        x.fillText("MENU", 40, 150);
        if(gameOver) x.fillText("TRY AGAIN", c.width/2-150, c.height/2);
        if(levelUp) x.fillText("LEVEL UP!", c.width/2-150, c.height/2);
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
