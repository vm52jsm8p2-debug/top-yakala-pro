<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body { margin:0; background:#000; overflow:hidden; touch-action:none; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById("c");
const x = c.getContext("2d");
c.width = window.innerWidth; c.height = window.innerHeight;

let p = {x:c.width/2-75, y:c.height-150, w:150, h:25};
let b = {x:c.width/2, y:c.height-175, dx:6, dy:-6, r:12, active:false};
let w = [], level = 1, maxLevel = 1, gameOver = false, levelUp = false, showMenu = false;

function init() {
    w = []; gameOver = false; levelUp = false; showMenu = false; b.active = false;
    p.x = c.width/2-75; b.x = p.x+75; b.y = p.y-15;
    
    for(let i=0; i<18; i++) {
        let offsetX = ((i * 59 + level * 23) % (c.width - 100));
        let offsetY = 80 + ((i * 41 + level * 11) % 250);
        if ((i + level) % (4 - Math.floor(level/8)) === 0) {
            w.push({x: offsetX, y: offsetY, w: 70, h: 25});
        }
    }
}
init();

window.addEventListener("touchstart", (e) => {
    let t = e.touches[0];
    if(showMenu) {
        let col = Math.floor(t.clientX / (c.width/3));
        let row = Math.floor((t.clientY - 120) / 100);
        let selected = row * 3 + col + 1;
        if(selected <= maxLevel) { level = selected; init(); }
        else showMenu = false;
    } else if(t.clientY < 80 && t.clientX < 150) { showMenu = true; }
    else if(gameOver) { init(); }
    else if(levelUp) { level++; if(level > maxLevel) maxLevel = level; init(); }
    else { b.active = true; }
});

function loop() {
    if(!gameOver && !levelUp && !showMenu) {
        if(b.active) {
            b.x += b.dx; b.y += b.dy;
            if(b.x<0 || b.x>c.width) b.dx *= -1;
            if(b.y<0) b.dy *= -1;
            if(b.y > p.y && b.x > p.x && b.x < p.x+p.w) b.dy = -Math.abs(b.dy);
            w.forEach((v,i) => {
                if(b.x > v.x && b.x < v.x+v.w && b.y > v.y && b.y < v.y+v.h) { w.splice(i,1); b.dy *= -1; }
            });
            if(w.length === 0) levelUp = true;
            if(b.y > c.height) gameOver = true;
        } else { b.x = p.x+75; }
    }
    
    x.clearRect(0,0,c.width,c.height);
    x.fillStyle="white"; x.fillRect(p.x,p.y,p.w,p.h);
    x.fillStyle="red"; x.beginPath(); x.arc(b.x,b.y,b.r,0,Math.PI*2); x.fill();
    x.fillStyle="cyan"; w.forEach(v => x.fillRect(v.x,v.y,v.w,v.h));
    
    if(showMenu) {
        x.fillStyle="black"; x.fillRect(0,0,c.width,c.height);
        x.fillStyle="white"; x.font="40px Arial"; x.fillText("SEVIYELER", 50, 80);
        for(let i=0; i<20; i++) {
            let active = (i + 1 <= maxLevel);
            x.fillStyle = active ? "green" : "#333";
            x.fillRect((i%3)*110+30, 120+Math.floor(i/3)*100, 90, 80);
            x.fillStyle = "white"; x.font="30px Arial";
            x.fillText(i+1, (i%3)*110+60, 175+Math.floor(i/3)*100);
        }
    } else {
        x.fillStyle="white"; x.font="35px Arial"; x.fillText("Lvl: "+level, 20, 50);
        x.fillText("MENU", 20, 100);
        if(gameOver) { x.font="50px Arial"; x.fillText("TRY AGAIN", c.width/2-130, c.height/2); }
        if(levelUp) { x.font="50px Arial"; x.fillText("LEVEL UP!", c.width/2-120, c.height/2); }
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
