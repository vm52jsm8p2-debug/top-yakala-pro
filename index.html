<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; background: #000; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var c = document.getElementById("c");
var x = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;

var p = {x: 100, y: 500, w: 100, h: 20};
var b = {x: 150, y: 400, dx: 5, dy: 5};

function loop() {
    x.clearRect(0, 0, c.width, c.height);
    x.fillStyle = "white";
    x.fillRect(p.x, p.y, p.w, p.h);
    
    b.x += b.dx;
    b.y += b.dy;
    
    if (b.x < 0 || b.x > c.width) b.dx *= -1;
    if (b.y < 0) b.dy *= -1;
    
    x.fillStyle = "red";
    x.beginPath();
    x.arc(b.x, b.y, 10, 0, 7);
    x.fill();
    
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
