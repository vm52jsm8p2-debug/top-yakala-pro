<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin:0; background:#000; overflow:hidden; touch-action:none; }
        canvas { display:block; }
        .btns { position:absolute; bottom:0; width:100%; height:250px; display:flex; }
        .btn { flex:1; touch-action:none; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="btns">
    <div id="l" class="btn"></div>
    <div id="r" class="btn"></div>
</div>
<script>
    var c = document.getElementById("c");
    var x = c.getContext("2d");
    c.width = window.innerWidth; c.height = window.innerHeight;

    var p = {x:c.width/2-100, y:c.height-300, w:200, h:30};
    var b = {x:c.width/2, y:c.height-350, dx:7, dy:-7, r:15, active:false};
    var w = [], level = 1, maxLevel = 1, gameOver = false, levelUp = false, showMenu = false;

    function init() {
        w = []; gameOver = false; levelUp = false; showMenu = false; b.active = false;
        p.x = c.width/2-100; b.x = p.x+100; b.y = p.y-20;
        // Her seviyede farklı dizilim (Simetrik olmayan)
        for(var i=0; i<15; i++) {
            if ((i + level * 3) % (4 - (level%3)) !== 0) {
                w.push({x: 30+(i%4)*90, y: 120+Math.floor(i/4)*70, w:80, h:40});
            }
        }
    }
    init();

    document.getElementById("l").addEventListener("touchstart", function(){ if(p.x > 0) p.x -= 50; });
    document.getElementById("r").addEventListener("touchstart", function(){ if(p.x < c.width-p.w) p.x += 50; });

    window.addEventListener("touchstart", function(e){
        var t = e.touches[0];
        if(showMenu) {
            var col = Math.floor(t.clientX / 150);
            var row = Math.floor((t.clientY-150)/150);
            var idx = row * 3 + col + 1;
            if(idx <= maxLevel && idx <= 20) { level = idx; init(); }
            else showMenu = false;
        } else if(t.clientY < 100 && t.clientX < 200) showMenu = true;
        else if(gameOver) init();
        else if(levelUp) { level++; if(level > maxLevel) maxLevel = level; init(); }
        else b.active = true;
    });

    function loop() {
        if(!gameOver && !levelUp && !showMenu) {
            if(b.active) {
                b.x += b.dx; b.y += b.dy;
                if(b.x<0 || b.x>c.width) b.dx *= -1;
                if(b.y<0) b.dy *= -1;
                if(b.y > p.y && b.x > p.x && b.x < p.x+p.w) b.dy = -Math.abs(b.dy);
                for(var i=0; i<w.length; i++){
                    if(b.x > w[i].x && b.x < w[i].x+w[i].w && b.y > w[i].y && b.y < w[i].y+w[i].h) { 
                        w.splice(i,1); b.dy *= -1; break; 
                    }
                }
                if(w.length === 0) levelUp = true;
                if(b.y > c.height) gameOver = true;
            } else { b.x = p.x+100; }
        }
        
        x.clearRect(0,0,c.width,c.height);
        x.fillStyle="white"; x.fillRect(p.x,p.y,p.w,p.h);
        x.fillStyle="red"; x.beginPath(); x.arc(b.x,b.y,b.r,0,Math.PI*2); x.fill();
        x.fillStyle="cyan";
        for(var i=0; i<w.length; i++){ x.fillRect(w[i].x, w[i].y, w[i].w, w[i].h); }
        
        x.fillStyle="white"; x.font="50px Arial";
        if(showMenu) {
            x.fillStyle="black"; x.fillRect(0,0,c.width,c.height);
            x.fillStyle="white"; x.fillText("SEVIYELER (Maks: "+maxLevel+")", 50, 100);
            for(var i=0; i<maxLevel; i++){
                x.fillStyle="green"; x.fillRect((i%3)*140+50, 150+Math.floor(i/3)*140, 120, 100);
                x.fillStyle="white"; x.fillText(i+1, (i%3)*140+90, 220+Math.floor(i/3)*140);
            }
        } else {
            x.fillText("Lvl: "+level, 40, 70);
            x.fillText("MENU", 40, 140);
            if(gameOver) x.fillText("GAME OVER", c.width/2-140, c.height/2);
            if(levelUp) x.fillText("LEVEL UP!", c.width/2-120, c.height/2);
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
