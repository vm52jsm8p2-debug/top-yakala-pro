<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
    body { margin:0; background:#000; overflow:hidden; touch-action:none; }
    canvas { display:block; }
    .btn { position:absolute; bottom:0; width:50%; height:200px; touch-action:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="l" class="btn" style="left:0"></div>
<div id="r" class="btn" style="right:0"></div>
<script>
const c = document.getElementById("c");
const x = c.getContext("2d");
c.width = window.innerWidth; c.height = window.innerHeight;

let p = {x:c.width/2-50, y:c.height-150, w:100, h:20};
let b = {x:c.width/2, y:c.height-170, dx:5, dy:-5, r:15, active:false};
let w = [], powers = [], gameOver = false, levelUp = false, showMenu = false, level = 1, maxLevel = 1;

function init() {
    w = []; powers = []; gameOver = false; levelUp = false; showMenu = false;
    b.active = false; b.dx = 5 + (level * 0.5); b.dy = -5 - (level * 0.5); // Seviyeye göre hız
    p.x = c.width/2 - 50;
    
    let cols = 5; let gap = 10;
    let wW = (c.width - (cols + 1) * gap) / cols;
    for(let i=0; i<cols; i++) {
        for(let j=0; j<3; j++) {
            w.push({x:gap + i*(wW+gap), y:70+j*40, w:wW, h:20});
        }
    }
}
init();

// --- Güç (Power-up) Mantığı ---
function spawnPower(xPos, yPos) {
    if(Math.random() > 0.5) { // %50 ihtimalle güç düşer
        powers.push({x: xPos, y: yPos, dy: 3, type: 'speed'});
    }
}

// ... (Dokunma ve Kontrol kodları aynı kalıyor) ...

function loop() {
    if(!gameOver && !levelUp && !showMenu) {
        if(b.active) {
            b.x+=b.dx; b.y+=b.dy;
            if(b.x<b.r || b.x>c.width-b.r) b.dx*=-1;
            if(b.y<b.r) b.dy*=-1;
            if(b.y>p.y-b.r && b.x>p.x && b.x<p.x+p.w) b.dy=-Math.abs(b.dy);
            
            w.forEach((v,i)=>{
                if(b.x>v.x && b.x<v.x+v.w && b.y>v.y && b.y<v.y+v.h) { 
                    w.splice(i,1); b.dy*=-1;
                    spawnPower(v.x + v.w/2, v.y); // Güç düşür
                }
            });
            // Güçleri hareket ettir
            powers.forEach((pwr, i) => {
                pwr.y += pwr.dy;
                if(pwr.y > p.y && pwr.x > p.x && pwr.x < p.x + p.w) {
                    b.dx *= 1.2; b.dy *= 1.2; // Topu hızlandır
                    powers.splice(i, 1);
                }
            });
            if(w.length === 0) levelUp = true;
        }
    }
    
    x.clearRect(0,0,c.width,c.height);
    // Çizimler...
    x.fillStyle="white"; x.fillRect(p.x,p.y,p.w,p.h);
    x.fillStyle="red"; x.beginPath(); x.arc(b.x,b.y,b.r,0,Math.PI*2); x.fill();
    x.fillStyle="cyan"; w.forEach(v=>x.fillRect(v.x,v.y,v.w,v.h));
    x.fillStyle="gold"; powers.forEach(pwr=>x.fillRect(pwr.x, pwr.y, 10, 10)); // Güçleri çiz
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
