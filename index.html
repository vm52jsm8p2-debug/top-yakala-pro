<!DOCTYPE html>
<html>
<head>
<style>
  .yonlendirme-kutusu {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: sans-serif;
    padding: 20px;
    background-color: #f4f4f4;
    border-radius: 10px;
  }

  .buyuk-yazi {
    font-size: 48px; /* Yazı boyutu */
    font-weight: bold;
    color: #333;
  }

  .ok-isareti {
    font-size: 60px; /* Okun boyutu */
    color: #ff4500;  /* Okun rengi */
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="yonlendirme-kutusu">
  <span class="buyuk-yazi">BURAYA BAKIN</span>
  <span class="ok-isareti">➔</span>
</div>

</body>
</html>
