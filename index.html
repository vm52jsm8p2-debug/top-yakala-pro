<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Emir - Çift Joystick</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; 
        }
        canvas {
            border: 4px solid #ffcc00;
            background-color: #2c3e50; 
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
            max-width: 100vw;
            max-height: 85vh;
        }
        #ui {
            margin-bottom: 5px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">Skor: <span id="scoreVal">0</span> | Can: <span id="healthVal">100</span></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <p style="margin: 5px 0 0 0;">Sol taraf: <b>Yürüme</b> | Sağ taraf: <b>Ateş Etme Yönü</b></p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Oyun Durumu
        let score = 0;
        let health = 100;
        let gameOver = false;

        // Oyuncu Özellikleri
        let player = {
            x: 300,
            y: 300,
            radius: 20,
            speed: 4,
            color: '#3498db',
            angle: 0
        };

        // Sol Joystick (Hareket)
        let moveJoy = {
            startX: 0, startY: 0,
            currentX: 0, currentY: 0,
            active: false, touchId: null,
            maxRadius: 50
        };

        // Sağ Joystick (Ateş Etme)
        let shootJoy = {
            startX: 0, startY: 0,
            currentX: 0, currentY: 0,
            active: false, touchId: null,
            maxRadius: 50
        };

        let moveX = 0;
        let moveY = 0;
        let shootX = 0;
        let shootY = 0;

        let bullets = [];
        let enemies = [];
        let lastShotTime = 0;
        const shotCooldown = 250; // Mermiler arası bekleme süresi (milisaniye)

        // Dokunmatik Başlangıcı
        canvas.addEventListener("touchstart", (e) => {
            if (gameOver) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();

            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                let touchX = touch.clientX - rect.left;
                let touchY = touch.clientY - rect.top;

                // EKRANIN SOL YARISI -> Hareket Joystick'i
                if (touchX < canvas.width / 2 && !moveJoy.active) {
                    moveJoy.active = true;
                    moveJoy.startX = touchX;
                    moveJoy.startY = touchY;
                    moveJoy.currentX = touchX;
                    moveJoy.currentY = touchY;
                    moveJoy.touchId = touch.identifier;
                }
                // EKRANIN SAĞ YARISI -> Ateş Etme Joystick'i
                else if (touchX >= canvas.width / 2 && !shootJoy.active) {
                    shootJoy.active = true;
                    shootJoy.startX = touchX;
                    shootJoy.startY = touchY;
                    shootJoy.currentX = touchX;
                    shootJoy.currentY = touchY;
                    shootJoy.touchId = touch.identifier;
                }
            }
        }, { passive: false });

        // Dokunmatik Hareketi
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();

            for (let i = 0; i < e.touches.length; i++) {
                let touch = e.touches[i];
                let touchX = touch.clientX - rect.left;
                let touchY = touch.clientY - rect.top;

                // Sol Joystick Güncelleme
                if (moveJoy.active && touch.identifier === moveJoy.touchId) {
                    let dx = touchX - moveJoy.startX;
                    let dy = touchY - moveJoy.startY;
                    let dist = Math.hypot(dx, dy);

                    if (dist > moveJoy.maxRadius) {
                        let angle = Math.atan2(dy, dx);
                        moveJoy.currentX = moveJoy.startX + Math.cos(angle) * moveJoy.maxRadius;
                        moveJoy.currentY = moveJoy.startY + Math.sin(angle) * moveJoy.maxRadius;
                    } else {
                        moveJoy.currentX = touchX;
                        moveJoy.currentY = touchY;
                    }
                    moveX = (moveJoy.currentX - moveJoy.startX) / moveJoy.maxRadius;
                    moveY = (moveJoy.currentY - moveJoy.startY) / moveJoy.maxRadius;
                }

                // Sağ Joystick Güncelleme
                if (shootJoy.active && touch.identifier === shootJoy.touchId) {
                    let dx = touchX - shootJoy.startX;
                    let dy = touchY - shootJoy.startY;
                    let dist = Math.hypot(dx, dy);

                    if (dist > shootJoy.maxRadius) {
                        let angle = Math.atan2(dy, dx);
                        shootJoy.currentX = shootJoy.startX + Math.cos(angle) * shootJoy.maxRadius;
                        shootJoy.currentY = shootJoy.startY + Math.sin(angle) * shootJoy.maxRadius;
                    } else {
                        shootJoy.currentX = touchX;
                        shootJoy.currentY = touchY;
                    }
                    shootX = (shootJoy.currentX - shootJoy.startX) / shootJoy.maxRadius;
                    shootY = (shootJoy.currentY - shootJoy.startY) / shootJoy.maxRadius;
                    
                    // Oyuncunun yüzünü ateş ettiği yöne çevir
                    player.angle = Math.atan2(shootY, shootX);
                }
            }
        }, { passive: false });

        // Dokunmatik Bitişi
        canvas.addEventListener("touchend", (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                
                if (moveJoy.active && touch.identifier === moveJoy.touchId) {
                    moveJoy.active = false;
                    moveJoy.touchId = null;
                    moveX = 0; moveY = 0;
                }
                if (shootJoy.active && touch.identifier === shootJoy.touchId) {
                    shootJoy.active = false;
                    shootJoy.touchId = null;
                    shootX = 0; shootY = 0;
                }
            }
        });

        // Ateş Etme Fonksiyonu
        function shoot(angle) {
            bullets.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 8,
                vy: Math.sin(angle) * 8,
                radius: 6,
                color: '#f1c40f'
            });
        }

        // Düşman Doğma Sistemi
        function spawnEnemy() {
            if (gameOver) return;
            
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -20 : canvas.width + 20;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? -20 : canvas.height + 20;
            }

            enemies.push({
                x: x, y: y, radius: 15,
                speed: 1.2 + Math.random() * 1.2,
                color: '#e74c3c'
            });

            setTimeout(spawnEnemy, Math.max(600, 2000 - score * 40));
        }
        spawnEnemy();

        // Ana Oyun Döngüsü
        function gameLoop() {
            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("OYUN BİTTİ", canvas.width/2 - 110, canvas.height/2);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Oyuncu Hareketi
            if (moveJoy.active) {
                player.x += moveX *
