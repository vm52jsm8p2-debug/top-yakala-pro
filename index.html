<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Emir - Brawl Stars Mobil</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Ekranın kaymasını engeller */
            user-select: none;
        }
        canvas {
            border: 4px solid #ffcc00;
            background-color: #2c3e50; 
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }
        #ui {
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">Skor: <span id="scoreVal">0</span> | Can: <span id="healthVal">100</span></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <p>Mobil: <b>Sol ekran joystick, sağ ekran ateş</b> | PC: <b>Oklar/WASD + Mouse</b></p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Oyun Durumu
        let score = 0;
        let health = 100;
        let gameOver = false;

        // Oyuncu (Brawler) Özellikleri
        let player = {
            x: 300,
            y: 300,
            radius: 20,
            speed: 4,
            color: '#3498db',
            angle: 0
        };

        // Joystick Özellikleri
        let joystick = {
            startX: 100,
            startY: 500,
            currentX: 100,
            currentY: 500,
            active: false,
            pointerId: null,
            maxRadius: 50
        };

        // Hareket Vektörleri (Joystick için)
        let moveX = 0;
        let moveY = 0;

        // Klavye Kontrolleri
        let keys = {};
        let mouse = { x: 0, y: 0 };

        window.addEventListener("keydown", (e) => {
            if (e.key.startsWith("Arrow")) keys[e.key] = true;
            else keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener("keyup", (e) => {
            if (e.key.startsWith("Arrow")) keys[e.key] = false;
            else keys[e.key.toLowerCase()] = false;
        });

        // Dokunmatik ve Mouse Olayları (Pointer Events)
        canvas.addEventListener("pointerdown", (e) => {
            if (gameOver) return;

            const rect = canvas.getBoundingClientRect();
            let clickX = e.clientX - rect.left;
            let clickY = e.clientY - rect.top;

            // Ekranın sol tarafına basıldıysa joystick'i oraya taşı ve aktif et
            if (clickX < canvas.width / 2 && !joystick.active) {
                joystick.active = true;
                joystick.startX = clickX;
                joystick.startY = clickY;
                joystick.currentX = clickX;
                joystick.currentY = clickY;
                joystick.pointerId = e.pointerId;
            } else {
                // Ekranın sağ tarafına basıldıysa ateş et
                shoot(clickX, clickY);
            }
        });

        canvas.addEventListener("pointermove", (e) => {
            const rect = canvas.getBoundingClientRect();
            let clickX = e.clientX - rect.left;
            let clickY = e.clientY - rect.top;

            mouse.x = clickX;
            mouse.y = clickY;

            if (joystick.active && e.pointerId === joystick.pointerId) {
                let dx = clickX - joystick.startX;
                let dy = clickY - joystick.startY;
                let dist = Math.hypot(dx, dy);

                if (dist > joystick.maxRadius) {
                    let angle = Math.atan2(dy, dx);
                    joystick.currentX = joystick.startX + Math.cos(angle) * joystick.maxRadius;
                    joystick.currentY = joystick.startY + Math.sin(angle) * joystick.maxRadius;
                } else {
                    joystick.currentX = clickX;
                    joystick.currentY = clickY;
                }

                // Hareket yönünü hesapla
                moveX = (joystick.currentX - joystick.startX) / joystick.maxRadius;
                moveY = (joystick.currentY - joystick.startY) / joystick.maxRadius;
                player.angle = Math.atan2(moveY, moveX);
            }
        });

        canvas.addEventListener("pointerup", (e) => {
            if (joystick.active && e.pointerId === joystick.pointerId) {
                joystick.active = false;
                joystick.pointerId = null;
                moveX = 0;
                moveY = 0;
            }
        });

        // Ateş Etme Mekaniği
        let bullets = [];
        function shoot(targetX, targetY) {
            let dx = targetX - player.x;
            let dy = targetY - player.y;
            let angle = Math.atan2(dy, dx);

            bullets.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 8,
                vy: Math.sin(angle) * 8,
                radius: 6,
                color: '#f1c40f'
            });
        }

        // Otomatik Nişan Alarak Ateş Etme (En yakın düşmana)
        function autoShoot() {
            if (enemies.length === 0 || gameOver) return;
            let closestEnemy = enemies[0];
            let minDist = Math.hypot(closestEnemy.x - player.x, closestEnemy.y - player.y);

            for (let e of enemies) {
                let dist = Math.hypot(e.x - player.x, e.y - player.y);
                if (dist < minDist) {
                    minDist = dist;
                    closestEnemy = e;
                }
            }
            shoot(closestEnemy.x, closestEnemy.y);
        }

        // Düşmanlar
        let enemies = [];
        function spawnEnemy() {
            if (gameOver) return;
            
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -20 : canvas.width + 20;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? -20 : canvas.height + 20;
            }

            enemies.push({
                x: x,
                y: y,
                radius: 15,
                speed: 1.2 + Math.random() * 1.2,
                color: '#e74c3c'
            });

            setTimeout(spawnEnemy, Math.max(600, 2000 - score * 40));
        }

        spawnEnemy();

        // Oyun Döngüsü
        function gameLoop() {
            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("OYUN BİTTİ", canvas.width/2 - 110, canvas.height/2);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Oyuncu Hareketi (Klavye)
            if ((keys['w'] || keys['ArrowUp']) && player.y > player.radius) player.y -= player.speed;
            if ((keys['s'] || keys['ArrowDown']) && player.y < canvas.height - player.radius) player.y += player.speed;
            if ((keys['a'] || keys['ArrowLeft']) && player.x > player.radius) player.x -= player.speed;
            if ((keys['d'] || keys['ArrowRight']) && player.x < canvas.width - player.radius) player.x += player.speed;

            // Oyuncu Hareketi (Joystick)
            if (joystick.active) {
                player.x += moveX * player.speed;
                player.y += moveY * player.speed;

                // Sınır kontrolü
                if (player.x < player.radius) player.x = player.radius;
                if (player.y < player.radius) player.y = player.radius;
                if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
                if (player.y > canvas.height - player.radius) player.y = canvas.height - player.radius;
            }

            // Oyuncuyu Çiz
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();

            // Silah yönünü çiz (Eğer joystick aktifse joystick yönüne, değilse mouse yönüne bakar)
            if (!joystick.active) {
                player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            }
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + Math.cos(player.angle) * 30, player.y + Math.sin(player.angle) * 30);
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.closePath();

            // 2. Joystick'i Ekrana Çiz (Sadece parmak basılıyken görünür)
            if (joystick.active) {
                // Büyük dış daire
                ctx.beginPath();
                ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
                ctx.fill();
                ctx.closePath();

                // Küçük iç buton
                ctx.beginPath();
                ctx.arc(joystick.currentX, joystick.currentY, 20, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
                ctx.fill();
                ctx.closePath();
            }

            // 3. Mermileri Çiz
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                    continue;
                }

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
                ctx.closePath();
            }

            // 4. Düşmanları Güncelle ve Çarpışma Kontrolü
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];

                let edx = player.x - e.x;
                let edy = player.y - e.y;
                let eAngle = Math.atan2(edy, edx);
                e.x += Math.cos(eAngle) * e.speed;
                e.y += Math.sin(eAngle) * e.speed;

                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();
                ctx.closePath();

                let distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                if (distToPlayer < player.radius + e.radius) {
                    enemies.splice(i, 1);
                    health -= 10;
                    document.getElementById("healthVal").innerText = health;
                    if (health <= 0) gameOver = true;
                    continue;
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let distToBullet = Math.hypot(b.x - e.x, b.y - e.y);
                    
                    if (distToBullet < b.radius + e.radius) {
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        document.getElementById("scoreVal").innerText = score;
                        break;
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
