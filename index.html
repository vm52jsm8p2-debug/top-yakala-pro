<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Emir - Takım Savaşı Fix</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { border: 4px solid #ffcc00; background: #2c3e50; max-width: 100vw; max-height: 80vh; }
        #ui { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="ui">Skor: <span id="scoreVal">0</span> | Can: <span id="healthVal">100</span> | Arkadaş Canı: <span id="allyHealthVal">100</span></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Karakterler
        let player = { x: 200, y: 300, radius: 20, color: '#3498db', angle: 0 };
        let ally = { x: 250, y: 350, radius: 20, color: '#2ecc71', hp: 100, lastShot: 0 };
        let enemies = [];
        let bullets = [];
        let enemyBullets = [];

        // Joystickler
        let moveJoy = { active: false, startX: 0, startY: 0, currX: 0, currY: 0, id: null };
        let shootJoy = { active: false, startX: 0, startY: 0, currX: 0, currY: 0, id: null };

        // Dokunmatik
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            for (let t of e.changedTouches) {
                let x = t.clientX - rect.left, y = t.clientY - rect.top;
                if (x < 300 && !moveJoy.active) { moveJoy.active = true; moveJoy.startX = moveJoy.currX = x; moveJoy.startY = moveJoy.currY = y; moveJoy.id = t.identifier; }
                else if (x >= 300 && !shootJoy.active) { shootJoy.active = true; shootJoy.startX = shootJoy.currX = x; shootJoy.startY = shootJoy.currY = y; shootJoy.id = t.identifier; }
            }
        }, {passive: false});

        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            for (let t of e.touches) {
                let x = t.clientX - rect.left, y = t.clientY - rect.top;
                if (moveJoy.active && t.identifier === moveJoy.id) { moveJoy.currX = x; moveJoy.currY = y; }
                if (shootJoy.active && t.identifier === shootJoy.id) { shootJoy.currX = x; shootJoy.currY = y; player.angle = Math.atan2(y - shootJoy.startY, x - shootJoy.startX); }
            }
        }, {passive: false});

        canvas.addEventListener("touchend", (e) => {
            for (let t of e.changedTouches) {
                if (moveJoy.id === t.identifier) moveJoy.active = false;
                if (shootJoy.id === t.identifier) shootJoy.active = false;
            }
        });

        // Düşman Ekleme
        setInterval(() => { if(enemies.length < 3) enemies.push({ x: Math.random()*600, y: Math.random()*600, hp: 100, lastShot: Date.now() }); }, 3000);

        function update() {
            // Hareket
            if (moveJoy.active) { player.x += (moveJoy.currX - moveJoy.startX)/20; player.y += (moveJoy.currY - moveJoy.startY)/20; }
            
            // Ateş
            if (shootJoy.active && Date.now() % 200 < 50) bullets.push({ x: player.x, y: player.y, vx: Math.cos(player.angle)*8, vy: Math.sin(player.angle)*8, owner: 'player' });

            // AI (Arkadaş)
            if(enemies.length > 0) {
                let e = enemies[0];
                let angle = Math.atan2(e.y - ally.y, e.x - ally.x);
                if(Date.now() % 400 < 50) bullets.push({ x: ally.x, y: ally.y, vx: Math.cos(angle)*8, vy: Math.sin(angle)*8, owner: 'ally' });
            }

            // Düşman Ateşi
            enemies.forEach(e => {
                if(Date.now() - e.lastShot > 2000) {
                    let angle = Math.atan2(player.y - e.y, player.x - e.x);
                    enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(angle)*4, vy: Math.sin(angle)*4 });
                    e.lastShot = Date.now();
                }
            });

            // Mermi Çiz/Güncelle
            bullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; });
            enemyBullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; });

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, 600, 600);
            ctx.fillStyle = player.color; ctx.beginPath(); ctx.arc(player.x, player.y, 20, 0, 7); ctx.fill();
            ctx.fillStyle = ally.color; ctx.beginPath(); ctx.arc(ally.x, ally.y, 20, 0, 7); ctx.fill();
            enemies.forEach(e => { ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(e.x, e.y, 20, 0, 7); ctx.fill(); });
            bullets.forEach(b => { ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 5, 5); });
            enemyBullets.forEach(b => { ctx.fillStyle = 'white'; ctx.fillRect(b.x, b.y, 5, 5); });
        }
        update();
    </script>
</body>
</html>
