<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Emir - Çift Joystick</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; 
        }
        canvas {
            border: 4px solid #ffcc00;
            background-color: #2c3e50; 
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
            max-width: 100vw;
            max-height: 85vh;
        }
        #ui {
            margin-bottom: 5px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">Skor: <span id="scoreVal">0</span> | Can: <span id="healthVal">100</span></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <p style="margin: 5px 0 0 0;">Sol taraf: <b>Yürüme</b> | Sağ taraf: <b>Ateş Yönü</b></p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let health = 100;
        let gameOver = false;

        let player = {
            x: 300,
            y: 300,
            radius: 20,
            speed: 4,
            color: '#3498db',
            angle: 0
        };

        let moveJoy = {
            startX: 0, startY: 0,
            currentX: 0, currentY: 0,
            active: false, touchId: null,
            maxRadius: 50
        };

        let shootJoy = {
            startX: 0, startY: 0,
            currentX: 0, currentY: 0,
            active: false, touchId: null,
            maxRadius: 50
        };

        let moveX = 0;
        let moveY = 0;
        let shootX = 0;
        let shootY = 0;

        let bullets = [];
        let enemies = [];
        let lastShotTime = 0;
        const shotCooldown = 250; 

        canvas.addEventListener("touchstart", (e) => {
            if (gameOver) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();

            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                let touchX = touch.clientX - rect.left;
                let touchY = touch.clientY - rect.top;

                if (touchX < canvas.width / 2 && !moveJoy.active) {
                    moveJoy.active = true;
                    moveJoy.startX = touchX;
                    moveJoy.startY = touchY;
                    moveJoy.currentX = touchX;
                    moveJoy.currentY = touchY;
                    moveJoy.touchId = touch.identifier;
                }
                else if (touchX >= canvas.width / 2 && !shootJoy.active) {
                    shootJoy.active = true;
                    shootJoy.startX = touchX;
                    shootJoy.startY = touchY;
                    shootJoy.currentX = touchX;
                    shootJoy.currentY = touchY;
                    shootJoy.touchId = touch.identifier;
                }
            }
        }, { passive: false });

        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();

            for (let i = 0; i < e.touches.length; i++) {
                let touch = e.touches[i];
                let touchX = touch.clientX - rect.left;
                let touchY = touch.clientY - rect.top;

                if (moveJoy.active && touch.identifier === moveJoy.touchId) {
                    let dx = touchX - moveJoy.startX;
                    let dy = touchY - moveJoy.startY;
                    let dist = Math.hypot(dx, dy);

                    if (dist > moveJoy.maxRadius) {
                        let angle = Math.atan2(dy, dx);
                        moveJoy.currentX = moveJoy.startX + Math.cos(angle) * moveJoy.maxRadius;
                        moveJoy.currentY = moveJoy.startY + Math.sin(angle) * moveJoy.maxRadius;
                    } else {
                        moveJoy.currentX = touchX;
                        moveJoy.currentY = touchY;
                    }
                    moveX = (moveJoy.currentX - moveJoy.startX) / moveJoy.maxRadius;
                    moveY = (moveJoy.currentY - moveJoy.startY) / moveJoy.maxRadius;
                }

                if (shootJoy.active && touch.identifier === shootJoy.touchId) {
                    let dx = touchX - shootJoy.startX;
                    let dy = touchY - shootJoy.startY;
                    let dist = Math.hypot(dx, dy);

                    if (dist > shootJoy.maxRadius) {
                        let angle = Math.atan2(dy, dx);
                        shootJoy.currentX = shootJoy.startX + Math.cos(angle) * shootJoy.maxRadius;
                        shootJoy.currentY = shootJoy.startY + Math.sin(angle) * shootJoy.maxRadius;
                    } else {
                        shootJoy.currentX = touchX;
                        shootJoy.currentY = touchY;
                    }
                    shootX = (shootJoy.currentX - shootJoy.startX) / shootJoy.maxRadius;
                    shootY = (shootJoy.currentY - shootJoy.startY) / shootJoy.maxRadius;
                    player.angle = Math.atan2(shootY, shootX);
                }
            }
        }, { passive: false });

        canvas.addEventListener("touchend", (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                if (moveJoy.active && touch.identifier === moveJoy.touchId) {
                    moveJoy.active = false;
                    moveJoy.touchId = null;
                    moveX = 0; moveY = 0;
                }
                if (shootJoy.active && touch.identifier === shootJoy.touchId) {
                    shootJoy.active = false;
                    shootJoy.touchId = null;
                    shootX = 0; shootY = 0;
                }
            }
        });

        function shoot(angle) {
            bullets.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 8,
                vy: Math.sin(angle) * 8,
                radius: 6,
                color: '#f1c40f'
            });
        }

        function spawnEnemy() {
            if (gameOver) return;
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -20 : canvas.width + 20;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? -20 : canvas.height + 20;
            }
            enemies.push({
                x: x, y: y, radius: 15,
                speed: 1.2 + Math.random() * 1.2,
                color: '#e74c3c'
            });
            setTimeout(spawnEnemy, Math.max(600, 2000 - score * 40));
        }
        spawnEnemy();

        function gameLoop() {
            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("OYUN BİTTİ", canvas.width/2 - 110, canvas.height/2);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (moveJoy.active) {
                player.x += moveX * player.speed;
                player.y += moveY * player.speed;
                if (!shootJoy.active) {
                    player.angle = Math.atan2(moveY, moveX);
                }
                if (player.x < player.radius) player.x = player.radius;
                if (player.y < player.radius) player.y = player.radius;
                if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
                if (player.y > canvas.height - player.radius) player.y = canvas.height - player.radius;
            }

            if (shootJoy.active) {
                let currentTime = Date.now();
                if (Math.hypot(shootX, shootY) > 0.3 && currentTime - lastShotTime > shotCooldown) {
                    shoot(player.angle);
                    lastShotTime = currentTime;
                }
            }

            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();

            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + Math.cos(player.angle) * 30, player.y + Math.sin(player.angle) * 30);
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.closePath();

            if (moveJoy.active) {
                ctx.beginPath();
                ctx.arc(moveJoy.startX, moveJoy.startY, moveJoy.maxRadius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
                ctx.fill();
                ctx.closePath();
                ctx.beginPath();
                ctx.arc(moveJoy.currentX, moveJoy.currentY, 20, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(52, 152, 219, 0.6)";
                ctx.fill();
                ctx.closePath();
            }

            if (shootJoy.active) {
                ctx.beginPath();
                ctx.arc(shootJoy.startX, shootJoy.startY, shootJoy.maxRadius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
                ctx.fill();
                ctx.closePath();
                ctx.beginPath();
                ctx.arc(shootJoy.currentX, shootJoy.currentY, 20, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(231, 76, 60, 0.6)";
                ctx.fill();
                ctx.closePath();
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                    continue;
                }
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
                ctx.closePath();
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let edx = player.x - e.x;
                let edy = player.y - e.y;
                let eAngle = Math.atan2(edy, edx);
                e.x += Math.cos(eAngle) * e.speed;
                e.y += Math.sin(eAngle) * e.speed;

                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();
                ctx.closePath();

                let distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                if (distToPlayer < player.radius + e.radius) {
                    enemies.splice(i, 1);
                    health -= 10;
                    document.getElementById("healthVal").innerText = health;
                    if (health <= 0) gameOver = true;
                    continue;
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let distToBullet = Math.hypot(b.x - e.x, b.y - e.y);
                    if (distToBullet < b.radius + e.radius) {
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        document.getElementById("scoreVal").innerText = score;
                        break;
                    }
                }
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
