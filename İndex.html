<!DOCTYPE html>
<html>
<body style="margin:0; background:#333; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div id="puzzle" style="display:grid; grid-template-columns:repeat(3, 100px); gap:2px;"></div>
    <script>
        let tiles = [0, 1, 2, 3, 4, 5, 6, 7, 8];
        // Resim linki hatasını çözmek için örnek bir internet görseli kullandım
        const imgUrl = "https://picsum.photos/300"; 

        function render() {
            const board = document.getElementById("puzzle");
            board.innerHTML = "";
            tiles.forEach((t, i) => {
                let div = document.createElement("div");
                div.style.width = "100px"; div.style.height = "100px";
                div.style.border = "1px solid #555";
                if (t === 8) { div.style.background = "#333"; }
                else {
                    div.style.backgroundImage = `url('${imgUrl}')`;
                    div.style.backgroundSize = "300px 300px";
                    div.style.backgroundPosition = `${-(t%3)*100}px ${-Math.floor(t/3)*100}px`;
                }
                div.onclick = () => {
                    let empty = tiles.indexOf(8);
                    if ([i-1, i+1, i-3, i+3].includes(empty)) {
                        [tiles[i], tiles[empty]] = [tiles[empty], tiles[i]];
                        render();
                    }
                };
                board.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
