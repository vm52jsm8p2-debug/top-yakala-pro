<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #222; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let x = canvas.width / 2;
    let y = canvas.height / 2;
    let dx = 4;
    let dy = 4;
    let ballRadius = 15;
    let gameSpeed = 1; // Oyunun genel hız çarpanı

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.beginPath();
        ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
        ctx.fillStyle = "#FF0000";
        ctx.fill();
        ctx.closePath();

        // Çarpışma kontrolü ve oyun genel hızını 2 katına çıkarma
        if (x + (dx * gameSpeed) > canvas.width - ballRadius || x + (dx * gameSpeed) < ballRadius) {
            dx = -dx;
            gameSpeed *= 2; // Çarptığında oyun hızını 2 katına çıkar
        }
        if (y + (dy * gameSpeed) > canvas.height - ballRadius || y + (dy * gameSpeed) < ballRadius) {
            dy = -dy;
            gameSpeed *= 2; // Çarptığında oyun hızını 2 katına çıkar
        }

        // Hareketi oyun hızına göre uygula
        x += dx * gameSpeed;
        y += dy * gameSpeed;
        
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
