<!DOCTYPE html>
<html>
<body style="margin:0; background:black;">
<canvas id="c"></canvas>
<script>
    var c = document.getElementById("c");
    var x = c.getContext("2d");
    
    // Ekran boyutlarını ayarla
    c.width = window.innerWidth;
    c.height = window.innerHeight;

    function draw() {
        // Arka planı temizle
        x.fillStyle = "black";
        x.fillRect(0, 0, c.width, c.height);
        
        // Raket
        x.fillStyle = "white";
        x.fillRect(c.width/2 - 50, c.height - 50, 100, 20);
        
        // Top (Sarı)
        x.fillStyle = "yellow";
        x.beginPath();
        x.arc(c.width/2, c.height/2, 20, 0, Math.PI*2);
        x.fill();
        
        // Yazı
        x.fillStyle = "white";
        x.font = "30px Arial";
        x.fillText("OYUN CALISIYOR", 20, 50);
    }
    draw();
</script>
</body>
</html>
